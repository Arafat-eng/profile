<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .profile-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #007bff;
            margin-bottom: 20px;
        }
        h1 {
            margin: 10px 0 5px 0;
            font-size: 24px;
            color: #222;
        }
        .tagline {
            color: #777;
            font-style: italic;
            margin-bottom: 20px;
        }
        .bio {
            font-size: 14px;
            line-height: 1.6;
            color: #555;
            margin-bottom: 25px;
        }
        .links a {
            display: inline-block;
            margin: 5px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
        }
        .links a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="profile-card">
    <img src="https://via.placeholder.com/150" alt="My Profile Picture" class="profile-pic">
    
    <h1>Your Name</h1>
    <p class="tagline">Student / Creator / Tech Enthusiast</p>
    
    <p class="bio">
        Hi! Welcome to my profile page. I'm passionate about learning new things, working on cool projects, and exploring the world of technology. Feel free to check out my links below!
    </p>
    
    <div class="links">
        <a href="#" target="_blank">GitHub</a>
        <a href="#" target="_blank">Twitter</a>
        <a href="mailto:your-email@example.com">Contact Me</a>
    </div>
</div>

</body>
</html>
