<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHANTO MK</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: #fff;
    overflow: hidden;
    height: 100vh;
    background: #000;
    position: relative;
  }
  #bg-video {
    position: fixed;
    top: 50%; left: 50%;
    min-width: 100%; min-height: 100%;
    transform: translate(-50%, -50%);
    z-index: 1;
    object-fit: cover;
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.85) 100%);
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    position: relative;
    z-index: 3;
    text-align: center;
    width: 380px;
    max-width: 92vw;
    padding: 40px 30px;
    border: 1px solid rgba(0,255,200,0.3);
    border-radius: 20px;
    background: rgba(10,10,20,0.75);
    backdrop-filter: blur(20px);
    box-shadow: 0 0 60px rgba(0,255,157,0.2);
  }
  .avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 4px solid #00ff9d;
    margin: 0 auto 20px;
    overflow: hidden;
  }
  .avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .name {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 6px;
    text-shadow: 0 0 20px #00ff9d;
  }
  .handle {
    color: #00ff9d;
    font-family: monospace;
    margin-bottom: 24px;
  }
  .enter {
    margin-top: 30px;
    font-size: 15px;
    color: #aaa;
    cursor: pointer;
    transition: all 0.3s;
  }
  .enter:hover {
    color: #00ff9d;
    text-shadow: 0 0 15px #00ff9d;
  }
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 4;
  }
</style>
</head>
<body>

<video id="bg-video" autoplay loop muted playsinline>
  <source src="/home/workdir/attachments/Screen Recording 2026-07-01 195828.mp4" type="video/mp4">
</video>

<div class="overlay">
  <div class="card">
    <div class="avatar">
      <img src="/home/workdir/attachments/channels4_profile.jpg" alt="PHANTO MK">
    </div>
    <div class="name">PHANTO MK</div>
    <div class="handle">@phanto_mk</div>
    
    <p style="color:#bbb; line-height:1.6; margin:20px 0;">
      Cyber Ronin • Digital Phantom<br>
      Synthwave &amp; Violence
    </p>

    <div class="enter" id="enterBtn">click to enter...</div>
  </div>
</div>

<div class="particles" id="particles"></div>

<script>
// Click to "enter" effect
document.getElementById('enterBtn').addEventListener('click', () => {
  alert("Welcome to the Phantom Realm");
  // You can redirect or trigger more effects here
});

// Simple floating particles
const particlesContainer = document.getElementById('particles');
for(let i = 0; i < 60; i++) {
  const p = document.createElement('div');
  p.style.position = 'absolute';
  p.style.width = p.style.height = Math.random() * 4 + 'px';
  p.style.background = '#00ff9d';
  p.style.borderRadius = '50%';
  p.style.opacity = Math.random() * 0.6 + 0.2;
  p.style.left = Math.random() * 100 + 'vw';
  p.style.top = Math.random() * 100 + 'vh';
  p.style.animation = `float ${Math.random() * 15 + 10}s linear infinite`;
  particlesContainer.appendChild(p);
}

// Add floating animation
const style = document.createElement('style');
style.innerHTML = `
  @keyframes float {
    0% { transform: translateY(0); }
    100% { transform: translateY(-100vh); }
  }
`;
document.head.appendChild(style);
</script>

</body>
</html>
