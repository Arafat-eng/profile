<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHANTO MK</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body,html{height:100%;overflow:hidden;background:#000;}
  #bg-video{
    position:fixed;
    top:50%; left:50%;
    min-width:100%; min-height:100%;
    transform:translate(-50%,-50%);
    z-index:1;
    object-fit:cover;
  }
  .overlay{
    position:fixed;
    inset:0;
    background:linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.9));
    z-index:2;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .content{text-align:center; z-index:3;}
  .title{
    font-size:52px;
    font-weight:900;
    letter-spacing:6px;
    color:#ddd;
    text-shadow:0 0 40px #880000;
    margin-bottom:40px;
  }
  .enter{
    font-size:19px;
    padding:20px 60px;
    border:2px solid #ff4444;
    color:#ffdddd;
    cursor:pointer;
    transition:0.4s;
  }
  .enter:hover{
    background:#ff0000;
    color:white;
    box-shadow:0 0 40px #ff0000;
  }
</style>
</head>
<body>

<!-- BACKGROUND VIDEO -->
<video id="bg-video" autoplay loop muted playsinline>
  <source src="ssstik.io_1777651151819 (1).mp4" type="video/mp4">
</video>

<div class="overlay">
  <div class="content">
    <div class="title">PHANTO MK</div>
    <div class="enter" onclick="window.location.href='main.html'">
      ENTER THE VOID
    </div>
  </div>
</div>

<script>
  // Force video to play
  document.getElementById('bg-video').play().catch(()=>{});
</script>

</body>
</html>
